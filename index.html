<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Arial, sans-serif;
}

body{
    background:linear-gradient(180deg,#e3f2fd,#ffffff);
    color:#0d47a1;
    min-height:100vh;
    overflow-x:hidden;
}

.main{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:12px;
}

header{
    background:linear-gradient(135deg,#1565c0,#0d47a1);
    color:white;
    text-align:center;
    padding:14px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

header h1{
    font-size:18px;
    font-weight:700;
}

header p{
    font-size:12px;
    opacity:0.9;
    margin-top:4px;
}

.content{
    display:flex;
    flex-direction:column;
    gap:12px;
    flex:1;
    margin-top:12px;
}

.card{
    background:white;
    border-radius:18px;
    padding:16px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* APP SECTION */
.download-box{
    text-align:center;
    position:relative;
    overflow:hidden;
}

/* WOMEN AVATAR */
.avatar{
    width:150px;
    max-width:100%;
    margin:0 auto 14px;
    display:block;
    animation:float 3s ease-in-out infinite;
    filter:drop-shadow(0 10px 18px rgba(0,0,0,0.25));
}

@keyframes float{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-8px);
    }
    100%{
        transform:translateY(0px);
    }
}

.btn{
    display:block;
    width:100%;
    padding:20px 0;
    font-size:18px;
    border-radius:40px;
    text-decoration:none;
    color:white;
    font-weight:700;
    text-align:center;
    background:linear-gradient(135deg,#2196f3,#0d47a1);
    box-shadow:0 8px 22px rgba(13,71,161,0.4);
    letter-spacing:1px;
    transition:0.2s ease;
}

.btn:hover{
    transform:translateY(-2px);
}

.btn:active{
    transform:scale(0.96);
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:12px;
    margin-top:10px;
}

th, td{
    border:1px solid #e0e0e0;
    padding:8px;
    text-align:center;
}

th{
    background:#e3f2fd;
    font-weight:700;
}

.features{
    text-align:center;
    font-size:12px;
    line-height:1.8;
    color:#333;
    font-weight:500;
}

footer{
    text-align:center;
    font-size:11px;
    color:#666;
    padding-top:10px;
}

/* MOBILE */
@media(max-width:480px){

    .avatar{
        width:110px;
    }

    .btn{
        font-size:16px;
        padding:18px 0;
    }

}
</style>

</head>

<body>

<div class="main">

    <header>
        <h1>🎯 Tiger Matka Online Game</h1>
        <p>Trusted Matka Platform</p>
    </header>

    <div class="content">

        <!-- DOWNLOAD CARD -->
        <div class="card download-box">

            <!-- WOMEN AVATAR PNG -->
            <!-- apni png image ka link yaha lagao -->
            <img src="https://tiger567.fun/tigerlogo.jpeg" alt="Women Avatar" class="avatar">

            <a href="https://tiger567.fun/tigermatka.apk" class="btn">🚀 DOWNLOAD APP</a>

        </div>

        <!-- GAME RATE CARD -->
        <div class="card">
            <h2>💰 Game Rates</h2>

            <table>
                <tr>
                    <th>Game</th>
                    <th>Return</th>
                </tr>

                <tr>
                    <td>Single</td>
                    <td>10→100</td>
                </tr>

                <tr>
                    <td>Jodi</td>
                    <td>10→1000</td>
                </tr>

                <tr>
                    <td>SP</td>
                    <td>10→1500</td>
                </tr>

                <tr>
                    <td>DP</td>
                    <td>10→3000</td>
                </tr>

                <tr>
                    <td>TP</td>
                    <td>10→10000</td>
                </tr>
            </table>
        </div>

        <!-- FEATURES -->
        <div class="card features">
            ✔ Fast Withdrawal <br>
            ✔ Trusted Platform <br>
            ✔ Daily Wins
        </div>

    </div>

    <footer>
        © 2026 Tiger Matka Online Game
    </footer>

</div>

</body>
